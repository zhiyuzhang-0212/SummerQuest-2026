[metadata]
status = "deferred_gpu"
purpose = "TinyStories batch-size learning curves from batch 1 through large-memory capacity probes, including 64 and 128."
deferred_reason = "GPU memory must be measured on the execution host; select supported runs or use --continue-on-error."

[model]
vocab_size = 10000
context_length = 256
d_model = 512
num_layers = 4
num_heads = 16
d_ff = 1344
rope_theta = 10000.0

[data]
train_path = "data/encoded/tinystories_train.npy"
validation_path = "data/encoded/tinystories_valid.npy"
dtype = "uint16"
validate_token_range = true
strict_token_range = false

[optimizer]
lr = 0.001
betas = [0.9, 0.95]
eps = 1e-8
weight_decay = 0.1
separate_weight_decay = true

[schedule]
max_learning_rate = 0.001
min_learning_rate = 0.0001
warmup_iters = 50
cosine_cycle_iters = 1000

[training]
device = "cuda"
seed = 1337
batch_size = 128
max_iters = 1000
max_grad_norm = 1.0
compile = true
log_interval = 10
eval_interval = 100
eval_iters = 20
checkpoint_interval = 500
eval_at_start = true

[run]
log_file = "metrics.jsonl"
checkpoint_file = "latest.pt"
keep_step_checkpoints = false

[sweep]
output_root = "runs/tinystories/batch_sweep"
parameter = "training.batch_size"
values = [1, 8, 32, 64, 128, 256, 512, 1024]
names = ["batch_1", "batch_8", "batch_32", "batch_64", "batch_128", "batch_256", "batch_512", "batch_1024"]
